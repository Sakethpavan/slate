server:
  port: ${PORT:8080}
  # Instructs Spring to look at X-Forwarded-* headers from the Hugging Face proxy
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        # Crucial for the browser to return the cookie after the google.com -> hf.space redirect
        same-site: "none"
        # Forces the cookie to only be transmitted over secure HTTPS connections
        secure: true
        path: "/"
logging:
  level:
    org.springframework.security: ${SLATE_SECURITY_LOG_LEVEL:INFO}
    org.springframework.web: ${SLATE_WEB_LOG_LEVEL:INFO}
    org.springframework.security.oauth2: ${SLATE_OAUTH_LOG_LEVEL:INFO}
spring:
  application:
    name: slate-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/slate}
    username: ${DATABASE_USERNAME:slate}
    password: ${DATABASE_PASSWORD:slate}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

slate:
  web-origin: ${SLATE_WEB_ORIGIN:http://localhost:5173}
  security:
    dev-user-enabled: ${SLATE_DEV_USER_ENABLED:false}
