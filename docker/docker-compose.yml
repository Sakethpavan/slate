services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: slate
      POSTGRES_USER: slate
      POSTGRES_PASSWORD: slate
    ports:
      - "5432:5432"
    volumes:
      - slate_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slate -d slate"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  slate_postgres:
