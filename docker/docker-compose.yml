services:
  postgres:
    image: postgres:16
    container_name: slate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: slate
      POSTGRES_USER: slate
      POSTGRES_PASSWORD: slate
    ports:
      - "5432:5432"
    volumes:
      - slate_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slate -d slate"]
      interval: 10s
      timeout: 5s
      retries: 5 

  pgadmin:
    image: dpage/pgadmin4
    container_name: slate-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - slate_pgadmin:/var/lib/pgadmin

volumes:
  slate_postgres:
  slate_pgadmin:
